#ubicacion{

.catalogo{

}

}

    width:300px;

    border-radius:10px;
    padding:10px;
}

    width:100%;
    height:200px;

    border-radius:10px;
}

.item h3{
    margin-top:10px;
    color:#110f0f;
}

.item p{
    color:#110b0b;
}

@keyframes mover{
    0%{
        transform:translateX(0);
    }

    100%{
        transform:translateX(-50%);
    }
}

.ubicacion-info{
