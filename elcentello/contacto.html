input, textarea{

button{
    background:black;
    color:white;
    border:none;
    padding:12px 25px;
    cursor:pointer;
}

button:hover{
    background:#08080a;
}

footer{

<div class="presentacion">

<style>

.presentacion{
    display:flex;
    align-items:center;
    gap:30px;
    padding:20px;
}

.slider-info{
    position:relative;
    width:100%;
    height:320px;
    overflow:hidden;
}

.slide{
    position:absolute;
    width:100%;
    display:flex;
    align-items:center;
    gap:30px;
    opacity:0;
    animation:mostrar 12s infinite;
}

.slide:nth-child(1){
    animation-delay:0s;
}

.slide:nth-child(2){
    animation-delay:4s;
}

.slide:nth-child(3){
    animation-delay:8s;
}

.slide img{
    width:350px;
    height:250px;
    object-fit:cover;
}

.texto{
    max-width:500px;
}

.texto h2{
    margin-bottom:15px;
}

@keyframes mostrar{

    0%{
        opacity:0;
    }

    10%{
        opacity:1;
    }

    30%{
        opacity:1;
    }

    40%{
        opacity:0;
    }

    100%{
        opacity:0;
    }
}

</style>
